<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Select Role</title>
        <!-- Favicon -->
        <link rel="icon" type="image/png" href="./assets/images/logo/logo.png" />

        <!-- CSS -->
        <link rel="stylesheet" href="./assets/css/index.css" />
        <link rel="stylesheet" href="./assets/css/style.css" />

        <!-- Shared JavaScript -->
        <script src="./js/util.js" defer></script>
        <script src="./js/render.js" defer></script>

        <!-- Components -->
        <script src="./js/components/header.js" defer></script>
        <script src="./js/components/footer.js" defer></script>
    </head>

    <body>
        <div class="container">
            <div class="wrapper">
                <!-- Header -->
                <div id="header"></div>
                <!-- Main Content -->
                <main class="main-content">
                    <h2 id="page-title">Select Your Role</h2>
                    <div class="role-buttons">
                        <button id="adminBtn" onclick="selectRole('admin')">Admin</button>
                        <button id="doctorBtn" onclick="selectRole('doctor')">Doctor</button>
                        <button id="patientBtn" onclick="selectRole('patient')">Patient</button>
                    </div>
                </main>
                <!-- Footer -->
                <div id="footer"></div>
            </div>
        </div>

        <!-- Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <button id="closeModal">&times;</button>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Page Script -->
        <script type="module" src="./js/services/index.js" defer></script>
    </body>
</html>
